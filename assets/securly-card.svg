<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Securly social card</title>
  <desc id="desc">Social preview card for the BghitCode Securly security-first agent skill.</desc>
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.45" stop-color="#124e4f"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6ee7b7"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <pattern id="dots" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#ffffff" opacity="0.11"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#cardBg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="#020617" opacity="0.38" stroke="#ffffff" stroke-opacity="0.16"/>

  <g transform="translate(116 128)">
    <path d="M84 0 158 29v61c0 62-36 106-74 125C46 196 10 152 10 90V29L84 0Z" fill="url(#accent)"/>
    <path d="M84 28 132 47v43c0 40-21 69-48 85-27-16-48-45-48-85V47l48-19Z" fill="#0f172a" opacity="0.9"/>
    <path d="M63 96 79 111l35-45" fill="none" stroke="#6ee7b7" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(316 132)">
    <text x="0" y="38" fill="#d1fae5" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800" letter-spacing="2">BGHITCODE</text>
    <text x="0" y="128" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="92" font-weight="850">Securly</text>
    <text x="0" y="188" fill="#d9f99d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="34" font-weight="750">Security-first guidelines for AI coding agents</text>
    <text x="0" y="250" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27">Prevent prompt injection, tool abuse, data leakage,</text>
    <text x="0" y="288" fill="#e2e8f0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="27">hardcoded secrets, and OWASP web risks.</text>
  </g>

  <g transform="translate(116 456)">
    <rect x="0" y="0" width="178" height="48" rx="24" fill="#ecfeff"/>
    <text x="25" y="31" fill="#0f172a" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">LLM Security</text>
    <rect x="198" y="0" width="190" height="48" rx="24" fill="#f0fdf4"/>
    <text x="223" y="31" fill="#14532d" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">Agent Tools</text>
    <rect x="408" y="0" width="206" height="48" rx="24" fill="#fff7ed"/>
    <text x="433" y="31" fill="#7c2d12" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="800">OWASP Web</text>
  </g>
</svg>
